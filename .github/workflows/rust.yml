name: Rust CI

on:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/rust.yml"
      - "contracts/**"
      - "solana/**"
  pull_request:
    branches: ["main"]
    paths:
      - ".github/workflows/rust.yml"
      - "contracts/**"
      - "solana/**"

concurrency:
  group: rust-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  cosmwasm:
    name: CosmWasm contract
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts/soccer-betting-contract

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown
          components: rustfmt, clippy

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            contracts/soccer-betting-contract -> target

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Lint
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --verbose

      - name: Build native
        run: cargo build --verbose

      - name: Build wasm
        run: cargo build --release --target wasm32-unknown-unknown --locked

      - name: Generate schema
        run: cargo run --bin schema --locked

  anchor:
    name: Solana Anchor program
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: solana
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            solana -> target

      - name: Set up Anchor / Solana / Node
        uses: metadaoproject/setup-anchor@v3.4
        with:
          anchor-version: 0.30.1
          solana-cli-version: 2.2.21
          node-version: 20.11.0

      - name: Show tool versions
        run: |
          rustc -V
          cargo -V
          solana --version
          anchor --version
          node --version

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Lint
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Cargo tests
        run: cargo test --workspace --verbose

      - name: Anchor build
        run: anchor build

      - name: Anchor test
        timeout-minutes: 20
        run: anchor test